# Production stack for a single host — sized for a FREE-TIER EC2 (1 GB RAM
# + the 2 GB swap file from DEPLOY.md §4).
#
# What runs here:  backend (your image) + caddy (HTTPS). That's all.
# What is EXTERNAL: Postgres (Neon), Redis (Upstash) and Qdrant (Qdrant Cloud
# free tier) — provided via .env.prod URLs.
# The frontend is deployed separately on Vercel.
#
# Usage on the host:
#   1. cp .env.prod.example .env.prod   &&   edit .env.prod with your real values
#   2. edit Caddyfile with your domain
#   3. docker compose -f docker-compose.prod.yml up -d --build

services:
  # ── Reverse proxy: terminates TLS (auto Let's Encrypt) and forwards to backend ──
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  # ── The Drishti API (built from backend/Dockerfile) ──────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env.prod   # includes QDRANT_URL / QDRANT_API_KEY (Qdrant Cloud)
    environment:
      NODE_ENV: production
      PORT: 4000
    # No published ports — only Caddy talks to it (over the internal network).
    expose:
      - "4000"
    volumes:
      # Persist the ~30MB on-device embedding model across image rebuilds.
      - hf_cache:/app/.cache

volumes:
  hf_cache:
  caddy_data:
  caddy_config:
