# Production stack for a single host — sized for a FREE-TIER EC2 (1 GB RAM
# + the 2 GB swap file from DEPLOY.md §4).
#
# What runs here:  backend (your image) + redis (BullMQ queue) + caddy (HTTPS).
# What is EXTERNAL: Postgres (Neon) and Qdrant (Qdrant Cloud free tier) — via .env.prod.
# Redis is now SELF-HOSTED here (no Upstash command quota); REDIS_URL is set
# below and overrides any value in .env.prod.
# The frontend is deployed separately on Vercel.
#
# Usage on the host:
#   1. cp .env.prod.example .env.prod   &&   edit .env.prod with your real values
#   2. edit Caddyfile with your domain
#   3. docker compose -f docker-compose.prod.yml up -d --build

services:
  # ── Reverse proxy: terminates TLS (auto Let's Encrypt) and forwards to backend ──
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  # ── The Drishti API (built from backend/Dockerfile) ──────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env.prod   # includes QDRANT_URL / QDRANT_API_KEY (Qdrant Cloud)
    environment:
      NODE_ENV: production
      PORT: 4000
      # Self-hosted Redis on this network — overrides any REDIS_URL in .env.prod.
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    # No published ports — only Caddy talks to it (over the internal network).
    expose:
      - "4000"
    volumes:
      # Persist the ~30MB on-device embedding model across image rebuilds.
      - hf_cache:/app/.cache

  # ── BullMQ job queue — self-hosted, no command quota ─────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # AOF persistence (queue survives restarts) + a memory cap that errors
    # instead of silently dropping jobs if it ever fills (noeviction).
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  hf_cache:
  redis_data:
  caddy_data:
  caddy_config:
