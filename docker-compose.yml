services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: drishti
      POSTGRES_USER: drishti_user
      POSTGRES_PASSWORD: drishti_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drishti_user -d drishti"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
  redis_data:

# Note: Redis runs locally for dev (Upstash port 6379 is often blocked on
#       home/office networks). Production uses Upstash via REDIS_URL in .env.
# Note: Run backend and frontend manually with npm run dev
